services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      NEXT_URL: http://localhost:3003
      GOOGLE_REDIRECT_URL: http://localhost:3002/api/auth/google/callback
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3000"
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3003
      NESTJS_API_URL: http://backend:3000
